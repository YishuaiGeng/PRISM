    provenance: ai-executed
    content: >
      The SPARC TeX manuscript originally used stronger wording than its
      evidence supported in several places: global Pareto dominance, a broad
      cross-model reading of limited diagnostics, and an unproved complete-model
      contraction statement. The revised manuscript now limits these claims and
      supplies propositions for the two uniqueness boundaries and full-model
      contraction.
    context: "Direct revision and compilation of docs/paper_draft/sparc_paper_zh.tex"
    potential_type: claim
    promoted: false
